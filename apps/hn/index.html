<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hacker News</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f6f6ef;
        color: #000;
      }

      a { color: inherit; text-decoration: none; }
      a:hover { text-decoration: underline; }

      /* ── Header ─────────────────────────────────── */
      .header {
        background: #ff6600;
        padding: 4px 8px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header-logo {
        font-weight: 700;
        border: 1px solid #000;
        padding: 1px 4px;
      }
      .header-title { font-weight: 700; }

      /* ── Layout ──────────────────────────────────── */
      .main {
        max-width: 840px;
        margin: 0 auto;
        padding: 12px 8px;
      }

      /* ── Story list ──────────────────────────────── */
      .story-list {
        list-style: none;
        padding: 0;
      }
      .story-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 5px 0;
        border-bottom: 1px solid #e8e8de;
      }
      .story-rank {
        min-width: 28px;
        text-align: right;
        color: #828282;
        font-size: 12px;
        flex-shrink: 0;
      }
      .story-body { flex: 1; min-width: 0; }
      .story-title { font-size: 14px; }
      .story-title a:visited { color: #828282; }
      .story-host {
        font-size: 11px;
        color: #828282;
        margin-left: 6px;
      }
      .story-meta {
        font-size: 11px;
        color: #828282;
        margin-top: 1px;
      }
      .story-meta a { color: #828282; }

      /* ── Story detail ────────────────────────────── */
      .story-detail { padding: 4px 0; }
      .back-link { color: #ff6600; font-size: 13px; display: block; margin-bottom: 12px; }
      .detail-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
      .detail-meta { font-size: 12px; color: #828282; margin-bottom: 16px; }
      .detail-text {
        font-size: 13px;
        line-height: 1.6;
        padding: 10px;
        background: #fff;
        border-radius: 3px;
        margin-bottom: 16px;
      }
      .detail-text p { margin-bottom: 8px; }
      .detail-text a { color: #ff6600; }
      .comments-heading { font-size: 13px; color: #828282; margin-bottom: 10px; }

      /* ── Comments ────────────────────────────────── */
      .comment {
        border-left: 2px solid #e8e8de;
        padding: 6px 10px;
        margin-bottom: 8px;
      }
      .comment-meta { font-size: 11px; color: #828282; margin-bottom: 4px; }
      .comment-text { font-size: 13px; line-height: 1.5; }
      .comment-text p { margin-bottom: 6px; }
      .comment-text a { color: #ff6600; }
      .comment-children { margin-top: 8px; }

      /* ── Route transitions ───────────────────────── */
      .fade-enter-active,
      .fade-leave-active {
        transition: opacity 200ms ease;
      }
      .fade-enter-from,
      .fade-leave-to {
        opacity: 0;
      }

      /* ── States ──────────────────────────────────── */
      .loading { color: #828282; padding: 8px 0; font-size: 12px; }
      .error   { color: #c00; padding: 8px 0; }
      .placeholder { color: #ccc; font-size: 11px; }
    </style>
  </head>
  <body>
    <hn-app></hn-app>
    <script type="module" src="/src/client.ts"></script>
  </body>
</html>
